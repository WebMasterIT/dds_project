<!doctype html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<title>{{ title }}</title>
		<link
			href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
			rel="stylesheet"
		/>
	</head>
	<body class="bg-light">
		<div class="container my-4">
			<h1 class="mb-4">{{ title }}</h1>

			<form method="post">
				{% csrf_token %} {{ form.as_p }}

				<button type="submit" class="btn btn-primary">Сохранить</button>
				<a href="{% url 'record_list' %}" class="btn btn-secondary">Отмена</a>
			</form>
		</div>
		<script>
			document.addEventListener('DOMContentLoaded', function () {
				const typeSelect = document.getElementById('id_type')
				const categorySelect = document.getElementById('id_category')
				const subcategorySelect = document.getElementById('id_subcategory')
				function fillSelect(select, data) {
					const previousValue = select.value
					select.innerHTML = ''

					data.forEach(function (item) {
						const option = document.createElement('option')
						option.value = item.id
						option.textContent = item.name
						select.appendChild(option)
					})

					select.value = previousValue
				}
				function loadCategories() {
					const typeId = typeSelect.value
					if (!typeId) {
						categorySelect.innerHTML = ''
						subcategorySelect.innerHTML = ''
						return
					}
					fetch('/api/categories/?type=' + typeId)
						.then(response => response.json())
						.then(function (data) {
							fillSelect(categorySelect, data)
							loadSubcategories()
						})
				}

				function loadSubcategories() {
					const categoryId = categorySelect.value
					if (!categoryId) {
						subcategorySelect.innerHTML = ''
						return
					}
					fetch('/api/subcategories/?category=' + categoryId)
						.then(response => response.json())
						.then(function (data) {
							fillSelect(subcategorySelect, data)
						})
				}

				typeSelect.addEventListener('change', loadCategories)
				categorySelect.addEventListener('change', loadSubcategories)

				loadCategories()
			})
		</script>
	</body>
</html>
